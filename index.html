    <style>
        /* This overlay ensures music plays after a user interaction */
        #music-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #music-overlay i {
            font-size: 4rem;
            color: #ff69b4; /* Pink heart color */
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        #music-overlay p {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-align: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>

</head>

<!-- Background Music Element -->
<audio id="bgMusic" loop>
    <source src="PraPraBackgroun.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script>
    let datetxt = "May 14";
    let datatxtletter = "";
    let titleLetter = "To you";

    let charArrDate = datetxt.split('');
    let currentIndex = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");

    // Existing text typing animation
    setTimeout(function () {
        let timeDatetxt = setInterval(function () {
            if (currentIndex < charArrDate.length) {
                date__of__birth.textContent += charArrDate[currentIndex++];
            } else {
                let i = document.createElement("i");
                i.className = "fa-solid fa-star";
                document.querySelector(".date__of__birth").prepend(i);
                document.querySelector(".date__of__birth").appendChild(i.cloneNode(true));
                clearInterval(timeDatetxt);
            }
        }, 100);
    }, 12000);

    // Audio Trigger Logic
    const overlay = document.getElementById('music-overlay');
    const audio = document.getElementById('bgMusic');

    // Function to handle audio playback and hide overlay
    function startExperience() {
        overlay.classList.add('hidden');
        
        // Skip to 3 seconds as requested
        audio.currentTime = 3;
        audio.play().catch(error => {
            console.log("Audio playback failed:", error);
        });
    }

    // Single listener for the whole screen
    overlay.addEventListener('click', startExperience);
    
</script>

</body>
