<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Greatest Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #E59A8F;
            --bg-color: #F8EDED;
            --glass-white: rgba(255, 255, 255, 0.9);
            --ios-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            --text-dark: #1D1D1F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(at 0% 0%, #F4E7E4 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #FFCBD1 0%, transparent 50%),
                        radial-gradient(at 50% 50%, #FFFFFF 0%, transparent 100%);
            filter: blur(60px);
        }

        #heartCanvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(45px) saturate(180%);
            -webkit-backdrop-filter: blur(45px) saturate(180%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s ease;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-card {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 40px 30px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: var(--ios-shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .enter-btn {
            background: #1D1D1F;
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s ease;
        }

        .enter-btn:active { transform: scale(0.96); }

        .wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px 40px;
            opacity: 0;
            transition: opacity 1s ease 0.5s;
        }

        body.unlocked .wrapper { opacity: 1; }

        .music-widget {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            box-shadow: var(--ios-shadow);
            border: 1px solid white;
        }

        .album-art {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #E59A8F, #FFCBD1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .letter-container {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: var(--ios-shadow);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
        }

        .letter-text {
            white-space: pre-wrap;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #333;
            text-align: left;
        }

        strong { font-weight: 700; color: #000; }
        .song-title { color: #D87A6F; font-weight: 700; font-style: italic; }

        #skipBtn {
            position: absolute;
            bottom: -45px;
            right: 10px;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.7;
            display: none;
        }

        #musicToggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            visibility: hidden;
            opacity: 0;
            transition: all 0.5s ease;
        }

        body.unlocked #musicToggle { visibility: visible; opacity: 1; }

        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.9rem;
            color: #888;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--accent);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        @media (max-width: 600px) {
            .letter-container { padding: 35px 25px; }
            .letter-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="bg-mesh"></div>
    <canvas id="heartCanvas"></canvas>

    <div id="overlay">
        <div class="intro-card">
            <div style="font-size: 40px; margin-bottom: 10px;">✉️</div>
            <h2 style="font-size: 1.6rem; font-weight: 700; margin-bottom: 8px;">A Message for You!</h2>
            <p style="color: #666; font-size: 0.9rem; line-height: 1.4;">I wrote something special just for you. Tap the button below to read it.</p>
            <button class="enter-btn" onclick="start()">Open Message</button>
        </div>
        <audio id="bgMusic" loop>
            <source src="IkawAtAko.mp3" type="audio/mpeg">
        </audio>
    </div>

    <button id="musicToggle" onclick="toggleMusic()">
        <svg id="musicIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </button>

    <div class="wrapper">
        <div class="music-widget">
            <div class="album-art">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </div>
            <div style="flex: 1;">
                <p style="font-weight: 700; font-size: 0.9rem; margin-bottom: 2px;">Ikaw at Ako</p>
                <p style="font-size: 0.75rem; color: #888;">TJ Monterde • Memories of Us</p>
            </div>
        </div>

        <main class="letter-container">
            <div class="letter-text" id="letterText"></div>
            <button id="skipBtn" onclick="skipTyping()">Show all text ↓</button>
        </main>

        <footer>
            <p>@<span id="year"></span> • Always supporting you</p>
        </footer>
    </div>

    <script>
        const message = `Happy birthday, my greatest love ^^

Sorry kung ‘di ko na naman natupad yung pangako ko sa’yo 🥺 Gusto ko sana ibigay sa’yo personally yung ilang months kong ginawa na charcoal portraits, pero hindi kami nanalo 😞 Kaya gumawa na lang ako ng lifetime website na para sa’yo lang ^^ Ikaw lang makaka-access basta ‘di mo mawawala yung link at ‘di mo ipapa open sa iba 😄 Sana magustuhan mo ^^.

It’s been 3 or 4 years na rin pala since wala na tayo…

Every time I hear <strong class="song-title">"Ikaw at Ako" by TJ Monterde</strong>, I can't help but think of you. It brings back so many memories, our laughter, those long conversation that felt like they could last forever.

The song reminds me of how special you were to me and the moments we shared. Masaya ako na nakilala kita—not just as a partner, but as someone who brought so much joy and inspiration into my life.

Eto na siguro yung pinaka huling regalo ko sa’yo, love ^^ Gusto ko sana magpaalam sa’yo in person for the last time bago ako pumunta sa Canada… pero kahit binigay ko na best ko, hindi pa rin kami nanalo😔. Ang dami ko sanang gustong sabihin sa’yo sa personal….pero mukhang hanggang dito na lang talaga😔

Nung time na may nakilala kang iba, pinili kong ilayo muna yung sarili ko para hindi ako maging abala sainyo 😓 that time Halo-halo yung naramdaman ko—nalungkot, kasi yung taong pinapasaya ko dati, may iba nang nagpapasaya😄… pero at the same time, masaya rin ako, kasi alam kong may taong nandyan para ibigay sa’yo yung mga bagay na gusto ko sanang maibigay, pero hindi ko na nagawa^^

1y Mahigit din kayo, noh? Dun pa lang alam kong mas better siya sakin HAHAHA. Kaya tinanggap ko na lang din that time na masaya kana ^^

Sana matupad mo lahat ng pangarap mo^^. Siguro hanggang dito na lang talaga yung kwento nating dalawa. Susuportahan pa rin naman kita from afar, pero baka hindi na ako magpaparamdam.

Sorry for not keeping my promise to you again 😞, and I’m really sorry for avoiding you. Sorry for everything I’ve done that hurt you or made things harder between us 🥺.

Hindi man ako yung pinaka-best na taong nakilala mo, but I hope one day when you hear my name, mapapangiti ka na lang and say, <strong>“I miss this person.”</strong> ^^

I hope that if we meet again someday… I hope we’re both already happy ^^.

Happy birthday ulit, <strong>Pra Prа</strong> ^^… Alam kong ilang beses ko nang sinabi sa’yo noon na “I love you for the last time", pero siguro eto na talaga yun.

I love you, love ^^ Ingatan mo palagi sarili mo 🥺`;

        document.getElementById('year').textContent = new Date().getFullYear();
        const audio = document.getElementById('bgMusic');
        const overlay = document.getElementById('overlay');
        const letterDiv = document.getElementById('letterText');
        const skipBtn = document.getElementById('skipBtn');
        let typingTimeout;
        let isTyping = false;

        function start() {
            audio.currentTime = 1; // Talong agad sa 1s para iwas dead air
            audio.play().catch(() => {});
            overlay.classList.add('hidden');
            document.body.classList.add('unlocked');
            setTimeout(startTyping, 1200);
        }

        function startTyping() {
            isTyping = true;
            skipBtn.style.display = "block";
            let i = 0;
            letterDiv.innerHTML = '<span id="content"></span><span class="cursor" id="cursor"></span>';
            const contentSpan = document.getElementById('content');
            const cursor = document.getElementById('cursor');

            function type() {
                if (i < message.length && isTyping) {
                    if (message.slice(i, i + 1) === '<') {
                        let tagEnd = message.indexOf('>', i);
                        contentSpan.innerHTML += message.slice(i, tagEnd + 1);
                        i = tagEnd + 1;
                    } else {
                        contentSpan.innerHTML += message.charAt(i);
                        i++;
                    }
                    
                    // Human-like speed based on character type
                    let speed = 65; // Base speed para sa normal reading
                    const lastChar = message.charAt(i - 1);
                    
                    if (lastChar === '.' || lastChar === '?' || lastChar === '!') speed = 850; // Pause sa dulo ng sentence
                    else if (lastChar === ',' || lastChar === '—') speed = 400; // Pause sa comma
                    else if (lastChar === '🥺' || lastChar === '😞' || lastChar === '😄') speed = 1000; // Pause sa emojis
                    else if (lastChar === '^') speed = 600; // Pause sa carets
                    else if (lastChar === ' ') speed = 40; // Mas mabilis sa spaces para mag-flow ang words
                    
                    typingTimeout = setTimeout(type, speed);
                    
                    // Auto-scroll logic para hindi mawala sa screen ang tinatype
                    const scrollTarget = document.body.scrollHeight;
                    if (window.scrollY + window.innerHeight < scrollTarget) {
                        window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
                    }
                } else {
                    if (cursor) cursor.style.display = 'none';
                    skipBtn.style.display = "none";
                }
            }
            type();
        }

        function skipTyping() {
            isTyping = false;
            clearTimeout(typingTimeout);
            letterDiv.innerHTML = message;
            skipBtn.style.display = "none";
        }

        function toggleMusic() {
            const icon = document.getElementById('musicIcon');
            if (audio.paused) {
                audio.play();
                icon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>';
            } else {
                audio.pause();
                icon.innerHTML = '<path d="M4.27 3L3 4.27l9 9v.28c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-1.73L19.73 21 21 19.73 4.27 3zM14 7h4V3h-6v5.18l2 2V7z"/>';
            }
        }

        // Heart Background Logic
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.size = Math.random() * 8 + 4;
                this.speed = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.swing = Math.random() * 2;
            }
            update() {
                this.y -= this.speed;
                this.swing += 0.01;
                if (this.y < -50) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#E59A8F';
                const x = this.x + Math.sin(this.swing) * 10;
                const s = this.size;
                ctx.beginPath();
                ctx.moveTo(x, this.y);
                ctx.bezierCurveTo(x, this.y-s/2, x-s, this.y-s/2, x-s, this.y);
                ctx.bezierCurveTo(x-s, this.y+s/2, x, this.y+s, x, this.y+s*1.2);
                ctx.bezierCurveTo(x, this.y+s, x+s, this.y+s/2, x+s, this.y);
                ctx.bezierCurveTo(x+s, this.y-s/2, x, this.y-s/2, x, this.y);
                ctx.fill();
                ctx.restore();
            }
        }
        for(let i=0; i<18; i++) hearts.push(new Heart());
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
